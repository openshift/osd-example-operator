apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: osde2e-workflow
  namespace: argo
  labels:
    app: osde2e-workflow
    version: v1.0.0
    purpose: osde2e-testing
spec:
  serviceAccountName: osde2e-workflow
  entrypoint: deploy-then-osde2e-pipeline
  onExit: failure-notification

  arguments:
    parameters:
    - name: operator-image
      value: "quay.io/rmundhe_oc/osd-example-operator-e2e:dc5b857"
    - name: test-harness-image
      value: "quay.io/rmundhe_oc/osd-example-operator-e2e:dc5b857"
    - name: operator-name
      value: "osd-example-operator"
    - name: operator-namespace
      value: "argo"
    - name: osde2e-image
      value: "quay.io/rh_ee_yiqzhang/osde2e:latest"
    - name: kubectl-image
      value: "quay.io/openshift/origin-cli:latest"
    - name: ocm-cluster-id
      value: "2klq8krfe7dda7tpensj8h7bqmtg0vk3"
    - name: test-timeout
      value: "3600"
    - name: cleanup-on-failure
      value: "true"

  templates:
  # Main pipeline
  - name: deploy-then-osde2e-pipeline
    steps:
    - - name: deploy-operator
        template: deploy-operator
    - - name: wait-for-deployment
        template: wait-for-deployment
    - - name: run-real-osde2e-test
        template: run-real-osde2e-test
    - - name: collect-test-results
        template: collect-test-results
        when: "{{steps.run-real-osde2e-test.status}} != Skipped"
    - - name: promote-and-notify
        template: promote-and-notify
        when: "{{steps.run-real-osde2e-test.status}} == Succeeded"
    - - name: cleanup-deployment
        template: cleanup-deployment
        when: "{{workflow.parameters.cleanup-on-failure}} == true || {{steps.run-real-osde2e-test.status}} == Succeeded"

  # Deploy Operator
  - name: deploy-operator
    container:
      image: "{{workflow.parameters.kubectl-image}}"
      command: [bash, -c]
      args:
      - |
        set -euo pipefail
        echo "Deploying {{workflow.parameters.operator-name}} to {{workflow.parameters.operator-namespace}}"

        # Install CRD first if not exists
        echo "Installing Example CRD..."
        cat <<EOF | kubectl apply -f -
        apiVersion: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        metadata:
          name: examples.managed.openshift.io
        spec:
          group: managed.openshift.io
          versions:
          - name: v1alpha1
            served: true
            storage: true
            schema:
              openAPIV3Schema:
                type: object
                properties:
                  spec:
                    type: object
                  status:
                    type: object
          scope: Namespaced
          names:
            plural: examples
            singular: example
            kind: Example
        EOF

        echo "CRD installation complete, deploying operator..."

        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: {{workflow.parameters.operator-name}}
          namespace: {{workflow.parameters.operator-namespace}}
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: {{workflow.parameters.operator-name}}
        rules:
        - apiGroups: [""]
          resources: ["pods", "services", "endpoints", "persistentvolumeclaims", "events", "configmaps", "secrets"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        - apiGroups: ["apps"]
          resources: ["deployments", "daemonsets", "replicasets", "statefulsets"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        - apiGroups: ["apiextensions.k8s.io"]
          resources: ["customresourcedefinitions"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        - apiGroups: ["managed.openshift.io"]
          resources: ["*"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: {{workflow.parameters.operator-name}}
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: {{workflow.parameters.operator-name}}
        subjects:
        - kind: ServiceAccount
          name: {{workflow.parameters.operator-name}}
          namespace: {{workflow.parameters.operator-namespace}}
        ---
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: {{workflow.parameters.operator-name}}
          namespace: {{workflow.parameters.operator-namespace}}
          labels:
            app: {{workflow.parameters.operator-name}}
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: {{workflow.parameters.operator-name}}
          template:
            metadata:
              labels:
                app: {{workflow.parameters.operator-name}}
            spec:
              serviceAccountName: {{workflow.parameters.operator-name}}
              containers:
              - name: operator
                image: {{workflow.parameters.operator-image}}
                imagePullPolicy: Always
                env:
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: WATCH_NAMESPACE
                  value: ""
                ports:
                - containerPort: 8081
                  name: metrics
                - containerPort: 8443
                  name: webhook
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 30
                  periodSeconds: 20
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                securityContext:
                  runAsNonRoot: true
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop: ["ALL"]
        EOF
        echo "Operator deployment configuration applied"

  # Wait for deployment ready
  - name: wait-for-deployment
    container:
      image: "{{workflow.parameters.kubectl-image}}"
      command: [bash, -c]
      args:
      - |
        set -euo pipefail
        echo "Waiting for {{workflow.parameters.operator-name}} deployment to be ready..."
        kubectl rollout status deployment/{{workflow.parameters.operator-name}} -n {{workflow.parameters.operator-namespace}} --timeout=600s
        kubectl wait --for=condition=ready pod -l app={{workflow.parameters.operator-name}} -n {{workflow.parameters.operator-namespace}} --timeout=300s
        echo "Operator successfully deployed and running"

  # Real OSDE2E test
  - name: run-real-osde2e-test
    container:
      image: "{{workflow.parameters.osde2e-image}}"
      command: ["/osde2e"]
      args:
      - test
      - --configs
      - "rosa,int,ad-hoc-image"
      - --skip-must-gather
      - --skip-destroy-cluster
      - --skip-health-check

      env:
      # OCM authentication (matching standard Docker approach)
      - name: OCM_TOKEN
        valueFrom:
          secretKeyRef:
            name: osde2e-credentials
            key: OCM_TOKEN
      - name: CLUSTER_ID
        value: "{{workflow.parameters.ocm-cluster-id}}"

      # AWS authentication (standard OSDE2E environment variables)
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: osde2e-credentials
            key: aws-access-key-id
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: osde2e-credentials
            key: aws-secret-access-key
      - name: AWS_ACCOUNT_ID
        valueFrom:
          secretKeyRef:
            name: osde2e-credentials
            key: aws-account-id
      - name: AWS_DEFAULT_REGION
        valueFrom:
          secretKeyRef:
            name: osde2e-credentials
            key: cloud-provider-region
      - name: AWS_REGION
        valueFrom:
          secretKeyRef:
            name: osde2e-credentials
            key: cloud-provider-region
      - name: CLOUD_PROVIDER_REGION
        valueFrom:
          secretKeyRef:
            name: osde2e-credentials
            key: cloud-provider-region

      # Test image configuration (matching standard Docker approach)
      - name: AD_HOC_TEST_IMAGES
        value: "{{workflow.parameters.test-harness-image}}"

      # ROSA/OpenShift configuration
      - name: ROSA_AWS_REGION
        valueFrom:
          secretKeyRef:
            name: osde2e-credentials
            key: cloud-provider-region
      - name: ROSA_ENV
        value: "int"
      - name: OCM_ENV
        value: "int"
      - name: ENVIRONMENT
        value: "int"

      # Cluster configuration
      - name: USE_EXISTING_CLUSTER
        value: "true"
      - name: CLUSTER_UP
        value: "false"
      - name: SKIP_DESTROY_CLUSTER
        value: "true"
      - name: SKIP_CLUSTER_HEALTH_CHECK
        value: "true"

      # Report configuration
      - name: REPORT_DIR
        value: "/tmp/osde2e-reports"

      # Ensure JUnit reports are generated
      - name: JUNIT_REPORT_DIR
        value: "/tmp/osde2e-reports"

      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 4Gi

      securityContext:
        runAsNonRoot: false  # OSDE2E image may require root privileges
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]

    # Output artifacts for UI display (archiving disabled to avoid bucket issues)
    # outputs:
    #   artifacts:
    #   - name: junit-report
    #     path: "/tmp/osde2e-reports"
    #     archive:
    #       none: {}
    #   - name: test-logs
    #     path: "/tmp/osde2e-reports/test_output.log"
    #     optional: true
    #     archive:
    #       none: {}

  # Collect and display test results
  - name: collect-test-results
    container:
      image: "{{workflow.parameters.kubectl-image}}"
      command: [bash, -c]
      args:
      - |
        set -euo pipefail
        echo "Collecting OSDE2E Test Results..."

        # Create results directory
        mkdir -p /tmp/test-results

        # Look for JUnit reports in the OSDE2E reports directory
        REPORT_DIR="/tmp/osde2e-reports"
        if [ -d "$REPORT_DIR" ]; then
          echo "Found OSDE2E reports directory"
          ls -la "$REPORT_DIR/" || true

          # Find JUnit XML files
          find "$REPORT_DIR" -name "*.xml" -type f | while read -r junit_file; do
            if [ -f "$junit_file" ]; then
              echo "📄 Found JUnit report: $junit_file"
              echo "JUnit Report Content:"
              echo "=========================="
              cat "$junit_file" || true
              echo "=========================="

              # Copy to output directory
              cp "$junit_file" "/tmp/test-results/" || true
            fi
          done

          # Show test output log
          if [ -f "$REPORT_DIR/test_output.log" ]; then
            echo "📝 Test Output Log (last 50 lines):"
            echo "===================================="
            tail -50 "$REPORT_DIR/test_output.log" || true
            echo "===================================="
          fi

          # Create a summary file
          echo "OSDE2E Test Results Summary" > /tmp/test-results/test-summary.txt
          echo "===========================" >> /tmp/test-results/test-summary.txt
          echo "Timestamp: $(date -u)" >> /tmp/test-results/test-summary.txt
          echo "Operator: {{workflow.parameters.operator-image}}" >> /tmp/test-results/test-summary.txt
          echo "Test Harness: {{workflow.parameters.test-harness-image}}" >> /tmp/test-results/test-summary.txt
          echo "Cluster: {{workflow.parameters.ocm-cluster-id}}" >> /tmp/test-results/test-summary.txt
          echo "" >> /tmp/test-results/test-summary.txt
          echo "Reports Directory Contents:" >> /tmp/test-results/test-summary.txt
          ls -la "$REPORT_DIR/" >> /tmp/test-results/test-summary.txt 2>/dev/null || echo "No reports found" >> /tmp/test-results/test-summary.txt
          echo "" >> /tmp/test-results/test-summary.txt
          echo "JUnit Files Found:" >> /tmp/test-results/test-summary.txt
          find "$REPORT_DIR" -name "*.xml" -type f >> /tmp/test-results/test-summary.txt 2>/dev/null || echo "No JUnit XML files found" >> /tmp/test-results/test-summary.txt

        else
          echo "WARNING: OSDE2E reports directory not found at $REPORT_DIR"
          echo "📁 Available directories:"
          find /tmp -type d -name "*osde2e*" 2>/dev/null || true
        fi

        echo "Test results collection complete"

        # Display all collected results in logs for easy viewing
        echo ""
        echo "FINAL TEST RESULTS SUMMARY"
        echo "=============================="
        if [ -f "/tmp/test-results/test-summary.txt" ]; then
          cat "/tmp/test-results/test-summary.txt"
        fi

        echo ""
        echo "📄 JUNIT XML FILES FOUND:"
        echo "========================="
        find "/tmp/test-results" -name "*.xml" -type f 2>/dev/null || echo "No JUnit XML files found"

        echo ""
        echo "JUNIT REPORTS CONTENT:"
        echo "========================="
        find "/tmp/test-results" -name "*.xml" -type f | while read -r xml_file; do
          if [ -f "$xml_file" ]; then
            echo ""
            echo "📄 File: $xml_file"
            echo "---"
            cat "$xml_file" 2>/dev/null || echo "Could not read $xml_file"
            echo "---"
          fi
        done

        echo ""
        echo "All test results displayed above in logs"

  # Cleanup deployment
  - name: cleanup-deployment
    container:
      image: "{{workflow.parameters.kubectl-image}}"
      command: [bash, -c]
      args:
      - |
        set -euo pipefail
        echo "Cleaning up deployment resources..."
        kubectl delete deployment {{workflow.parameters.operator-name}} -n {{workflow.parameters.operator-namespace}} --ignore-not-found=true
        kubectl delete clusterrolebinding {{workflow.parameters.operator-name}} --ignore-not-found=true
        kubectl delete clusterrole {{workflow.parameters.operator-name}} --ignore-not-found=true
        kubectl delete serviceaccount {{workflow.parameters.operator-name}} -n {{workflow.parameters.operator-namespace}} --ignore-not-found=true

        # Don't delete argo namespace as it's an existing system namespace
        echo "Cleanup complete (preserving namespace: {{workflow.parameters.operator-namespace}})"


  - name: promote-and-notify
    container:
      image: "{{workflow.parameters.kubectl-image}}"
      command: ["/bin/sh", "-c"]
      args:
      - |
        set -e

        # Success message
        echo "OSDE2E Test Gate SUCCESS - Ready for production!"
        echo "Operator Image: {{workflow.parameters.operator-image}}"
        echo "Test Harness: {{workflow.parameters.test-harness-image}}"
        echo "Cluster: {{workflow.parameters.ocm-cluster-id}}"
        echo "Workflow: {{workflow.name}}"

        # Simple Slack success notification
        TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
        DURATION="{{workflow.duration}}"

        MESSAGE="OSDE2E Test Gate PASSED!\\nOperator: {{workflow.parameters.operator-image}}\\nTest Harness: {{workflow.parameters.test-harness-image}}\\nCluster: {{workflow.parameters.ocm-cluster-id}}\\nEnvironment: INT\\nDuration: $DURATION\\nTime: $TIMESTAMP\\nWorkflow: {{workflow.name}}\\nStatus: Ready for Production"

        if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
          curl -X POST -H 'Content-type: application/json' \
               --data "{\"text\":\"$MESSAGE\"}" \
               "${SLACK_WEBHOOK_URL}"

          if [ $? -eq 0 ]; then
            echo "Slack success notification sent"
          else
            echo "WARNING: Slack notification failed (exit code: $?)"
            echo "📝 Webhook URL: ${SLACK_WEBHOOK_URL}"
          fi
        else
          echo "INFO: No Slack webhook configured, skipping notification"
        fi

      env:
      - name: SLACK_WEBHOOK_URL
        valueFrom:
          secretKeyRef:
            name: osde2e-credentials
            key: slack-webhook-url
            optional: true

      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi


  - name: failure-notification
    container:
      image: "{{workflow.parameters.kubectl-image}}"
      command: ["/bin/sh", "-c"]
      args:
      - |
        set -e

        # Only notify on actual failure, not success
        if [ "{{workflow.status}}" != "Succeeded" ]; then
          echo "OSDE2E Test Gate FAILED!"
          echo "Operator Image: {{workflow.parameters.operator-image}}"
          echo "Test Harness: {{workflow.parameters.test-harness-image}}"
          echo "Cluster: {{workflow.parameters.ocm-cluster-id}}"
          echo "Status: {{workflow.status}}"
          echo "Logs: argo logs {{workflow.name}} -n argo"

          # Simple Slack failure notification
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          DURATION="{{workflow.duration}}"

          MESSAGE="OSDE2E Test Gate FAILED!\\nOperator: {{workflow.parameters.operator-image}}\\nTest Harness: {{workflow.parameters.test-harness-image}}\\nCluster: {{workflow.parameters.ocm-cluster-id}}\\nEnvironment: INT\\nStatus: {{workflow.status}}\\nDuration: $DURATION\\nTime: $TIMESTAMP\\nWorkflow: {{workflow.name}}\\nLogs: argo logs {{workflow.name}} -n argo"

          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            curl -X POST -H 'Content-type: application/json' \
                 --data "{\"text\":\"$MESSAGE\"}" \
                 "${SLACK_WEBHOOK_URL}"

            if [ $? -eq 0 ]; then
              echo "Slack failure notification sent"
            else
              echo "WARNING: Slack notification failed (exit code: $?)"
              echo "📝 Webhook URL: ${SLACK_WEBHOOK_URL}"
            fi
          else
            echo "INFO: No Slack webhook configured, skipping notification"
          fi
        else
          echo "INFO: Workflow succeeded, no failure notification needed"
        fi

      env:
      - name: SLACK_WEBHOOK_URL
        valueFrom:
          secretKeyRef:
            name: osde2e-credentials
            key: slack-webhook-url
            optional: true

      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi


